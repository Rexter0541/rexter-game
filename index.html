<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taoist Survivor: Five Elements</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
</head>
<body>
    <div id="ui-layer">
        <div id="stats">
            <span>HP: <b id="hp-txt">100</b></span> | 
            <span>QI: <b id="qi-txt">100</b></span> | 
            <span>KILLS: <b id="score-txt">0</b></span>
        </div>

        <div id="gacha-overlay">
            <div class="gacha-card">
                <h2>Temple of Summoning</h2>
                <div id="summon-result">???</div>
                <p>Cost: 20 Qi per summon</p>
                <div class="gacha-btns">
                    <button class="gacha-btn" onclick="pullGacha()">Summon Taoist</button>
                    <button id="start-btn" class="gacha-btn gold" onclick="startGame()" style="display:none;">Defend the Mountain</button>
                </div>
            </div>
        </div>

        <canvas id="gameCanvas" width="800" height="500"></canvas>

        <div class="footer-ui">
            <button id="connectBtn" class="web3-small">Connect Wallet</button>
            <span>WASD to Move | Auto-attacks nearest enemy</span>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
